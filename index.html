  }, { threshold: 0.08 });
  document.querySelectorAll('.section-band').forEach(s => observer.observe(s));

  // Nav shadow on scroll
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 10);
  });
}

render();
</script>
</body>
</html>
